<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 25 · Marco Normativo PRL · Test CNP-EB</title>
<style>
  :root{
    --navy:#0b1f3a;
    --navy2:#12294d;
    --gold:#d4a72c;
    --gold2:#f0cd6a;
    --granate:#7a1f2b;
    --granate2:#9c2b39;
    --cream:#f6efe0;
    --green:#2f8f5b;
    --red:#c0392b;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at 15% 10%, #16305a 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, #3a0f16 0%, transparent 45%),
      linear-gradient(160deg, var(--navy) 0%, var(--navy2) 55%, #081527 100%);
    color:var(--cream);
    min-height:100vh;
    padding:24px 14px 60px;
  }
  .wrap{max-width:900px;margin:0 auto;}
  header.top{
    text-align:center;
    margin-bottom:28px;
  }
  header.top h1{
    font-size:1.7rem;
    margin:0 0 6px;
    color:var(--gold2);
    letter-spacing:.5px;
    text-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  header.top p{margin:0;color:#c9d3e4;font-size:.95rem;}
  .badge-row{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .badge{
    background:linear-gradient(135deg, var(--granate), var(--granate2));
    padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;
    border:1px solid rgba(255,255,255,.15);
  }

  /* MENU DE PAGINAS */
  #menu{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:18px;
  }
  .pagecard{
    background:linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border:1px solid rgba(212,167,44,.35);
    border-radius:16px;
    padding:20px;
    cursor:pointer;
    transition:.25s transform, .25s box-shadow, .25s border-color;
    position:relative;
    overflow:hidden;
  }
  .pagecard::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--gold), var(--granate));
  }
  .pagecard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--gold);}
  .pagecard .num{
    font-size:2rem;font-weight:800;color:var(--gold2);
    font-family:Georgia,serif;
  }
  .pagecard h3{margin:6px 0 8px;font-size:1.05rem;color:#fff;line-height:1.3;}
  .pagecard .meta{font-size:.8rem;color:#b8c2d6;}
  .pagecard .score-pill{
    margin-top:10px;display:inline-block;
    padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:700;
    background:rgba(255,255,255,.08);
  }
  .score-pill.done{background:linear-gradient(135deg,var(--green),#1e6b41);}

  /* QUIZ VIEW */
  #quizview{display:none;}
  .quiz-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:16px;flex-wrap:wrap;gap:10px;
  }
  .btn{
    background:linear-gradient(135deg, var(--gold), #b9871f);
    border:none;color:#231600;font-weight:700;
    padding:10px 18px;border-radius:10px;cursor:pointer;font-size:.9rem;
    transition:.2s transform;
  }
  .btn:hover{transform:scale(1.04);}
  .btn.secondary{
    background:transparent;border:1.5px solid var(--gold2);color:var(--gold2);
  }
  .progress-track{
    width:100%;height:10px;background:rgba(255,255,255,.08);
    border-radius:6px;overflow:hidden;margin-bottom:22px;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg, var(--granate), var(--gold));
    width:0%;transition:width .3s;
  }
  .qcounter{font-size:.85rem;color:#c9d3e4;text-align:center;margin-bottom:10px;}

  .qcard{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:18px;
    padding:26px 22px;
    box-shadow:var(--shadow);
  }
  .qcard h2{
    font-size:1.15rem;line-height:1.5;margin:0 0 20px;color:#fff;font-weight:600;
  }
  .qnum-tag{
    display:inline-block;background:var(--granate);color:#fff;
    font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:8px;margin-bottom:10px;
  }
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;padding:14px 16px;border-radius:12px;
    background:rgba(255,255,255,.04);
    border:1.5px solid rgba(255,255,255,.14);
    color:var(--cream);cursor:pointer;font-size:.95rem;line-height:1.4;
    transition:.15s all;
  }
  .opt:hover{border-color:var(--gold2);background:rgba(212,167,44,.1);}
  .opt.correct{background:rgba(47,143,91,.35);border-color:var(--green);}
  .opt.wrong{background:rgba(192,57,43,.3);border-color:var(--red);}
  .opt.disabled{pointer-events:none;opacity:.85;}
  .feedback{margin-top:16px;font-size:.9rem;padding:12px 14px;border-radius:10px;display:none;}
  .feedback.ok{background:rgba(47,143,91,.2);border:1px solid var(--green);display:block;}
  .feedback.bad{background:rgba(192,57,43,.2);border:1px solid var(--red);display:block;}
  .qcard-footer{display:flex;justify-content:flex-end;margin-top:20px;}

  /* RESULT VIEW */
  #resultview{display:none;text-align:center;}
  .result-circle{
    width:150px;height:150px;border-radius:50%;
    margin:20px auto;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:conic-gradient(var(--gold) calc(var(--pct)*1%), rgba(255,255,255,.08) 0);
    position:relative;
  }
  .result-circle::before{
    content:"";position:absolute;inset:10px;border-radius:50%;
    background:var(--navy2);
  }
  .result-circle span{position:relative;font-size:2rem;font-weight:800;color:var(--gold2);}
  .result-circle small{position:relative;color:#c9d3e4;font-size:.8rem;}
  #resultview h2{color:#fff;}
  .result-msg{font-size:1.05rem;margin:14px 0 20px;color:var(--gold2);font-weight:600;}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

  footer.credit{text-align:center;margin-top:40px;color:#7d8bab;font-size:.75rem;}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>📘 TEMA 25 · Marco Normativo Básico en PRL</h1>
    <p>CNP · Escala Básica — Estudia página a página y confirma tu aprendizaje con un test de 30 preguntas</p>
    <div class="badge-row">
      <span class="badge">6 Páginas</span>
      <span class="badge">180 Preguntas</span>
      <span class="badge">Sin tiempo</span>
      <span class="badge">Distractores cruzados</span>
    </div>
  </header>

  <div id="menu"></div>

  <section id="quizview">
    <div class="quiz-header">
      <button class="btn secondary" onclick="goMenu()">← Volver al menú</button>
      <strong id="quizTitle" style="color:var(--gold2)"></strong>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="qcounter" id="qcounter"></div>
    <div class="qcard">
      <span class="qnum-tag" id="qtag"></span>
      <h2 id="qtext"></h2>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="qcard-footer">
        <button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Siguiente →</button>
      </div>
    </div>
  </section>

  <section id="resultview">
    <div class="result-circle" id="resultCircle" style="--pct:0"><span id="resultPct">0%</span><small id="resultFrac">0/30</small></div>
    <h2 id="resultTitle"></h2>
    <p class="result-msg" id="resultMsg"></p>
    <div class="actions">
      <button class="btn" onclick="retryTest()">🔁 Repetir este test</button>
      <button class="btn secondary" onclick="goMenu()">📋 Volver al menú</button>
    </div>
  </section>

  <footer class="credit">Contenido basado en tu transcripción del Tema 25 · Verificado con normativa vigente (BOE)</footer>
</div>

<script>
const PAGE_META = {
 1: {desc:"Ley 31/1995 · INSST · Comisión Nacional · ITSS · Fundación · Comité y Delegados de Prevención (empresa)"},
 2: {desc:"RD 39/1997 · Plan de Prevención · Evaluación de Riesgos · Modalidades · Niveles · Auditoría · Anexo I"},
 3: {desc:"RD 2/2006 (I) · Ámbito de aplicación · Principios Generales · Control/Auditoría · Salud de la PN"},
 4: {desc:"RD 2/2006 (II) · Delegados de Prevención Policial · Comisión y Comités · Servicio de Prevención"},
 5: {desc:"RD 67/2010 · PRL en la AGE · Comisión Técnica · Delegados · Comité · Servicios de Prevención"},
 6: {desc:"Derechos y Deberes Básicos · Trabajadores (LPRL) vs. Funcionarios del CNP (RD 2/2006)"}
};

let scores = JSON.parse(localStorage.getItem('t25_scores') || '{}');
let current = {page:null, order:[], idx:0, correct:0, answered:false};

function renderMenu(){
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  for(let p=1;p<=6;p++){
    const t = TESTDATA[p];
    const done = scores[p];
    const card = document.createElement('div');
    card.className='pagecard';
    card.onclick = ()=>startTest(p);
    card.innerHTML = `
      <div class="num">P${p}</div>
      <h3>${t.title.split('·')[1] || t.title}</h3>
      <div class="meta">${PAGE_META[p].desc}</div>
      <div class="score-pill ${done?'done':''}">${done? '✅ '+done.correct+'/30 ('+done.pct+'%)' : '⏳ Sin realizar'}</div>
    `;
    menu.appendChild(card);
  }
}

function goMenu(){
  document.getElementById('menu').style.display='grid';
  document.getElementById('quizview').style.display='none';
  document.getElementById('resultview').style.display='none';
  renderMenu();
}

function startTest(p){
  current = {page:p, order:[...Array(30).keys()], idx:0, correct:0, answered:false};
  document.getElementById('menu').style.display='none';
  document.getElementById('resultview').style.display='none';
  document.getElementById('quizview').style.display='block';
  document.getElementById('quizTitle').textContent = TESTDATA[p].title;
  renderQuestion();
}

function retryTest(){
  startTest(current.page);
}

function renderQuestion(){
  current.answered = false;
  const q = TESTDATA[current.page].quiz[current.order[current.idx]];
  document.getElementById('qtag').textContent = `Pregunta ${current.idx+1} de 30`;
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('qcounter').textContent = `${current.idx+1} / 30 — Aciertos: ${current.correct}`;
  document.getElementById('progressFill').style.width = ((current.idx)/30*100)+'%';
  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML='';
  const fb = document.getElementById('feedback');
  fb.className='feedback';
  fb.style.display='none';
  document.getElementById('nextBtn').style.display='none';

  q.opts.forEach((opt, i)=>{
    const b = document.createElement('button');
    b.className='opt';
    b.textContent = opt;
    b.onclick = ()=>selectOption(i, q, b);
    optsDiv.appendChild(b);
  });
}

function selectOption(i, q, btnEl){
  if(current.answered) return;
  current.answered = true;
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach((b, idx)=>{
    b.classList.add('disabled');
    if(idx === q.a) b.classList.add('correct');
    if(idx === i && i !== q.a) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  if(i === q.a){
    current.correct++;
    fb.className='feedback ok';
    fb.textContent = '✅ ¡Correcto!';
  } else {
    fb.className='feedback bad';
    fb.textContent = '❌ Incorrecto. La respuesta correcta era: "' + q.opts[q.a] + '"';
  }
  document.getElementById('qcounter').textContent = `${current.idx+1} / 30 — Aciertos: ${current.correct}`;
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('nextBtn').textContent = (current.idx === 29) ? 'Ver resultado →' : 'Siguiente →';
}

function nextQuestion(){
  if(current.idx < 29){
    current.idx++;
    renderQuestion();
  } else {
    finishTest();
  }
}

function finishTest(){
  document.getElementById('quizview').style.display='none';
  document.getElementById('resultview').style.display='block';
  const pct = Math.round(current.correct/30*100);
  document.getElementById('resultCircle').style.setProperty('--pct', pct);
  document.getElementById('resultPct').textContent = pct+'%';
  document.getElementById('resultFrac').textContent = current.correct+'/30';
  document.getElementById('resultTitle').textContent = TESTDATA[current.page].title;
  let msg = '';
  if(pct >= 90) msg = '🏆 Dominio excelente. Esta página está lista para el examen.';
  else if(pct >= 70) msg = '👍 Buen nivel, repasa los fallos antes de pasar de página.';
  else if(pct >= 50) msg = '⚠️ Nivel medio. Vuelve a leer la página antes de repetir el test.';
  else msg = '🔴 Necesitas repasar la página en profundidad antes de continuar.';
  document.getElementById('resultMsg').textContent = msg;

  scores[current.page] = {correct: current.correct, pct: pct};
  localStorage.setItem('t25_scores', JSON.stringify(scores));
}

renderMenu();
</script>
</body>
</html>
